{% extends "base/base_manager.html" %}

{% load static %}



{% block extra_css %}

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/schedule/schedule_setup.css' %}">

{% endblock %}



{% block content %}

<div class="schedule-page">

<div class="top-panel">

<div class="calendar-card">

<div class="cal-header">

<button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>

<span class="cal-month-label" id="calMonthLabel"></span>

<button class="cal-nav-btn" onclick="changeMonth(1)">›</button>

</div>

<div class="cal-grid" id="calGrid"></div>

</div>



<div class="setup-card">

<div class="setup-title" id="setupTitle">Thiết lập nhân sự</div>

<div style="margin-bottom: 10px; font-size: 13px;">

<input type="checkbox" id="applyAll"> <label for="applyAll">Áp dụng cho cả tuần</label>

</div>

<select class="ca-select" id="caSelect" onchange="renderPosList()" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">

<option value="sang">Ca Sáng (7h30 – 12h30)</option>

<option value="chieu">Ca Chiều (12h30 – 17h30)</option>

<option value="toi">Ca Tối (17h30 – 22h30)</option>

</select>

<div id="posList" style="margin-top: 15px;"></div>

</div>

</div>



<div class="overview-card">

<div class="overview-header">📅 <span style="font-weight:700; margin-left:5px;">Tổng quan Lịch làm tuần</span></div>

<div class="ov-table-wrap">

<table class="ov-table" id="ovTable"></table>

</div>

</div>



<div class="bottom-actions">

<button class="btn-huy" onclick="handleHuy()">Tải lại Data</button>

<button class="btn-luu" onclick="saveScheduleToBackend()">Lưu lịch</button>

</div>

</div>



<div class="toast" id="toast">✅ Đã lưu thành công!</div>



<script>

const API_CAPACITY_URL = "{% url 'api_capacity' %}";

console.log("Đã nạp URL:", API_CAPACITY_URL); // Dòng này để kiểm tra trong F12

</script>



{% load static %}

<script src="{% static 'js/schedule_setup.js' %}"></script>

{% endblock %}
