{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hệ thống quản lý nhân sự{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #8B1A2B;
            --primary-dark: #6B1220;
            --primary-light: #A52035;
            --sidebar-bg: #2C3142;
            --sidebar-text: #B8BFCE;
            --sidebar-active: #8B1A2B;
            --card-bg: #F5EDD8;
            --card-bg-hover: #EDE0C4;
            --body-bg: #9AA5B8;
            --content-bg: #8C97AA;
            --white: #fff;
            --text-dark: #1E2235;
            --text-muted: #6B7280;
            --icon-circle: #2C3142;
            --icon-accent: #C8A84B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--body-bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
        }

        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 22px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text h2 {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        .logo-text span {
            color: var(--sidebar-text);
            font-size: 11px;
            font-weight: 400;
        }

        .sidebar-section {
            padding: 18px 16px 6px;
        }

        .sidebar-section-label {
            color: #7A8299;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--sidebar-text);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
            text-decoration: none;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
        }

        .nav-item.active {
            background: var(--sidebar-active);
            color: #fff;
            font-weight: 600;
        }

        .nav-item .nav-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--content-bg);
        }

        .header {
            background: var(--primary);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 88px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            right: -30px;
            top: -30px;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            right: 80px;
            bottom: -40px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }

        .header-title {
            color: #fff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
            cursor: pointer;
        }

        .header-user-info {
            text-align: right;
        }

        .header-user-info .name {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }

        .header-user-info .role {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            object-fit: cover;
            background: #C8A84B;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            font-weight: 700;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.22s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .stat-card:hover {
            background: var(--card-bg-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .stat-icon {
            font-size: 36px;
            line-height: 1;
            color: var(--icon-circle);
            flex-shrink: 0;
        }

        .stat-info .stat-value {
            font-size: 30px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.1;
        }

        .stat-info .stat-label {
            font-size: 13px;
            color: #5A6377;
            font-weight: 500;
            margin-top: 2px;
        }

        .section-card {
            background: rgba(255,255,255,0.18);
            border-radius: 16px;
            padding: 22px 24px;
            backdrop-filter: blur(4px);
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 16px;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .quick-card {
            background: #fff;
            border-radius: 14px;
            padding: 22px 16px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.22s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            text-decoration: none;
            color: inherit;
        }

        .quick-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.13);
        }

        .quick-icon,
        .quick-icon-circle {
            width: 56px;
            height: 56px;
            background: var(--icon-circle);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--icon-accent);
            transition: transform 0.2s;
        }

        .quick-card:hover .quick-icon,
        .quick-card:hover .quick-icon-circle {
            transform: scale(1.08);
        }

        .quick-text {
            text-align: center;
        }

        .quick-text .qt-title {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 3px;
        }

        .quick-text .qt-sub {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .activity-item {
            background: rgba(255,255,255,0.85);
            border-radius: 10px;
            padding: 13px 18px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            transition: background 0.2s;
        }

        .activity-item:hover {
            background: rgba(255,255,255,0.97);
        }

        .activity-item .act-text {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .activity-item .act-time {
            font-size: 11.5px;
            color: var(--text-muted);
        }

        .logout-dropdown,
        .dropdown-menu {
            position: fixed;
            top: 80px;
            right: 32px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            padding: 12px;
            display: none;
            z-index: 9999;
        }

        .logout-dropdown.show,
        .dropdown-menu.show {
            display: block;
        }

        .logout-dropdown a,
        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #F4F5F7;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 15px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .logout-dropdown a:hover,
        .dropdown-item:hover {
            background: #E8EBF0;
        }

        @media (max-width: 1100px) {
            .stat-cards,
            .quick-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userMenuBtn = document.getElementById('userMenuBtn');
            const logoutDropdown = document.getElementById('logoutDropdown');

            if (userMenuBtn && logoutDropdown) {
                userMenuBtn.addEventListener('click', function(e) {
                    logoutDropdown.classList.toggle('show');
                    e.stopPropagation();
                });

                document.addEventListener('click', function(e) {
                    if (!userMenuBtn.contains(e.target)) {
                        logoutDropdown.classList.remove('show');
                    }
                });
            }
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
