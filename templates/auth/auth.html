{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý Nhân sự</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        .left-side {
            width: 50%;
            background-color: #f7f3e8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .left-side::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 10px;
            background-color: #2c355a;
        }

        .left-side::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 10px;
            background-color: #2c355a;
        }

        .text-banner {
            text-align: center;
        }

        .text-banner h1 {
            font-size: 8rem;
            text-transform: uppercase;
            margin: 0;
            line-height: 0.9;
        }

        .text-banner h1:nth-child(1),
        .text-banner h1:nth-child(3) {
            color: #2c355a;
        }

        .text-banner h1:nth-child(2) {
            color: #a01000;
            font-size: 5rem;
        }

        .right-side {
            width: 50%;
            background-color: #2c355a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-text h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .header-text h2 {
            font-size: 24px;
            font-weight: 400;
        }

        .logo-small {
            height: 35px;
            vertical-align: middle;
            margin-left: 10px;
        }

        .login-container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            color: #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #a01000;
            box-shadow: 0 0 10px rgba(160, 16, 0, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background-color: #a01000;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .btn-login:hover {
            background-color: #7a0c00;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .alert-error {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            background-color: #ffe5e5;
            color: #a01000;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 991px) {
            body {
                flex-direction: column;
            }

            .left-side,
            .right-side {
                width: 100%;
            }

            .left-side {
                min-height: 35vh;
            }

            .right-side {
                min-height: 65vh;
            }

            .text-banner h1 {
                font-size: 4rem;
            }

            .text-banner h1:nth-child(2) {
                font-size: 2.8rem;
            }

            .login-container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="left-side">
        <div class="text-banner">
            <h1>Come In</h1>
            <h1>We Are</h1>
            <h1>Open</h1>
        </div>
    </div>

    <div class="right-side">
        <div class="header-text">
            <h1>Hệ thống quản lý nhân sự</h1>
            <h2>
                Trà sữa
                <img src="{% static 'images/LOGOBONG.png' %}" alt="Bông" class="logo-small">
            </h2>
        </div>

        <div class="login-container">
            <form method="post" autocomplete="off">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="Nhập tên đăng nhập..."
                           autocomplete="off"
                           required>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Nhập mật khẩu..."
                           autocomplete="new-password"
                           required>
                </div>

                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>

            {% if error %}
                <div class="alert-error">{{ error }}</div>
            {% endif %}
        </div>
    </div>

</body>
</html>
